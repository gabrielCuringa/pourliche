<div class="flex flex-col gap-2">
  <div class="bg-neutral-50 border rounded-xl">
    <p class="px-4 py-2 text-sm font-bold">Répartition mensuelle</p>
    <hr />
    <div>
      @if (facade.summary.isLoading()) {
        <div class="flex flex-col gap-2 px-4 py-2">
          <p-skeleton />
          <p-skeleton />
          <p-skeleton />
        </div>
      } @else {
        @if ((facade.summary.value()?.length ?? 0) > 0) {
          @for (item of facade.summary.value(); track item.employee_id) {
            <summary-item [summary]="item"></summary-item>
            @if (!$last) {
              <hr />
            }
          }
        } @else {
          <p class="text-xs px-4 py-2">Le récap' n'est pas encore disponible.</p>
        }
      }
    </div>
  </div>
</div>
